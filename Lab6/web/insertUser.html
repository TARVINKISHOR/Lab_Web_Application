<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Register User</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                background-color: #f0f0f0;
                margin: 0;
                padding: 20px;
            }

            h2 {
                text-align: center;
            }

            form {
                background-color: #ffffff;
                width: 350px;
                margin: 30px auto;
                padding: 20px;
                border: 1px solid #cccccc;
            }

            table {
                width: 100%;
            }

            td {
                padding: 6px;
            }

            input[type="text"],
            input[type="password"] {
                width: 100%;
                padding: 5px;
                box-sizing: border-box;
            }

            input[type="submit"] {
                width: 100%;
                padding: 8px;
                background-color: #4a90d9;
                color: white;
                border: none;
                cursor: pointer;
                margin-top: 10px;
            }

            input[type="submit"]:hover {
                background-color: #357abd;
            }

            a {
                display: block;
                text-align: center;
                margin-top: 10px;
                font-size: 13px;
            }
        </style>
    </head>
    <body>

        <h2>User Registration</h2>

        <form action="processUser.jsp" method="post">
            <table>
                <tr>
                    <td>Username:</td>
                    <td><input type="text" name="username" maxlength="15" required /></td>
                </tr>
                <tr>
                    <td>Password:</td>
                    <td><input type="password" name="password" maxlength="10" required /></td>
                </tr>
                <tr>
                    <td>First Name:</td>
                    <td><input type="text" name="firstname" maxlength="50" required /></td>
                </tr>
                <tr>
                    <td>Last Name:</td>
                    <td><input type="text" name="lastname" maxlength="50" required /></td>
                </tr>
                <tr>
                    <td colspan="2">
                        <input type="submit" value="Register" />
                    </td>
                </tr>
            </table>
        </form>

        <div style="text-align:center;">
            Already have an account? <a href="login.jsp">Login here</a>
        </div>

    </body>
</html>
