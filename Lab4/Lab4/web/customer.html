<html>
    <head>
        <title>TODO supply a title</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css"/>
    </head>
    <body>
    <body>
        <h1>Use JSP Scriptlet and JSP Expression in Application</h1>

        <div class="card">
            <h2 class="form-title">Customer Discount</h2>

            <form action="processCustomer.jsp" method="post">

                <div class="form-group">
                    <label for="customerCode">Customer Code</label>
                    <input type="text" id="customerCode" name="customerCode" placeholder="Key-in customer code">
                </div>

                <div class="form-group">
                    <label for="quantity">Quantity</label>
                    <input type="number" id="quantity" name="quantity" placeholder="Key-in quantity" min="0">
                </div>

                <div class="form-group">
                    <label>Customer Type</label>
                    <div class="radio-group">
                        <label>
                            <input type="radio" name="customerType" value="1" checked>
                            Normal Customer
                        </label>
                        <label>
                            <input type="radio" name="customerType" value="2">
                            Privilege Customer
                        </label>
                    </div>
                </div>

                <div class="buttons">
                    <button type="submit" class="btn">Submit</button>
                    <button type="reset" class="btn">Cancel</button>
                </div>

            </form>
        </div>
    </body>
</html>
