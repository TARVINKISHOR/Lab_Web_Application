<html>
    <head>
        <title>TODO supply a title</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css"/>

    </head>
    <body>
        <h1>Use JSP Declaration Tag, JSP Scriptlet and JSP Expression in Application</h1>
        <div class="card">
            <h2 class="form-title">Currency Conversion</h2>
            <form action="processCurrency.jsp" method="post">
                <div class="form-group">
                    <label for="amount">Amount (in RM)</label>
                    <input type="number" id="amount" name="amount" placeholder="(in RM)" min="0">
                </div>
                <div class="form-group">
                    <label for="currencyType">Convert to</label>
                    <div class="select">
                        <select id="currencyType" name="currencyType">
                            <option value="1">USD</option>
                            <option value="2">EURO</option>
                            <option value="3">JPY</option>
                            <option value="4">SGD</option>
                        </select>
                    </div>
                </div>
                <div class="buttons">
                    <button type="submit" class="btn">Submit</button>
                    <button type="reset" class="btn">Cancel</button>
                </div>
            </form>
        </div>
    </body>
</html>
