<html>
    <head>
        <title>TODO supply a title</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <h1>Passing data from main JSP page to other JSP page</h1>
        <form id="memberFrm" action="processCalculateCarLoan.jsp" method="post"
              onsubmit="return checkAmount()">
            <fieldset>
                <legend>Perform Car Loan Calculation</legend>
                <label for="amount">Loan Amount* </label>
                <input type="text" id="amount" name="amount" size="10" placeholder="Amount"><br/>
                <label for="period">Period</label>
                <select name="period" size="1">
                    <option value="3">3 years</option>
                    <option value="4">4 years</option>
                    <option value="5">5 years</option>
                    <option value="7">7 years</option>
                </select>
                <p>
                    <input type="submit" id="btnSubmit" value="Submit">
                    <input type="reset" id="btnCancel" value="Cancel">
                </p>
            </fieldset>
        </form>
    </body>
</html>
